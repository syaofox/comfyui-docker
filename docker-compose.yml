services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: "${PUID:-1000}"
        PGID: "${PGID:-1000}"
        GH_PROXY: "${GH_PROXY:-}"
        APT_MIRROR: "${APT_MIRROR:-}"
        PIP_MIRROR: "${PIP_MIRROR:-}"
    image: comfyui-docker:latest
    container_name: comfyui-docker
    ports:
      - "8188:8188"
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./input:/home/comfy/app/input
      - ./custom_nodes:/home/comfy/app/custom_nodes
      - ./models:/home/comfy/app/models
      - ./output:/home/comfy/app/output
      - ./user:/home/comfy/app/user
      - ./.cache:/home/comfy/app/.cache
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - COMFYUI_PATH=/home/comfy/app
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/home/comfy/app/.cache/hf_download
      - MODELSCOPE_CACHE=/home/comfy/app/.cache/modelscope
      - U2NET_HOME=/home/comfy/app/models/u2net
      - GH_PROXY=${GH_PROXY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    shm_size: 8g
